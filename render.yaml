services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: yutrade-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        value: sqlite:////data/yutrade.db   # path on the persistent disk
      - key: EMAIL_BACKEND
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                  # set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false                  # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false                  # set to your frontend URL after it deploys
      - key: UPLOAD_DIR
        value: /data/uploads         # persistent disk path for uploaded images
    disk:
      name: yutrade-data
      mountPath: /data               # yutrade.db and uploads/ live here
      sizeGB: 1

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: yutrade
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false                  # set to your backend URL, e.g. https://yutrade-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # needed for React Router client-side routing
