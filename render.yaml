services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: yutrade-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        value: sqlite:///./yutrade.db
      - key: EMAIL_BACKEND
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                  # set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false                  # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false                  # set to your frontend URL after it deploys
      - key: UPLOAD_DIR
        value: uploads

  # Frontend is deployed separately on Vercel (free)
  # See frontend/.env.example for required env vars
